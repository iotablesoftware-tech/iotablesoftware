id: "00-meta.decision-records"
title: "Decision Records"
status: "canonical"
version: "1.0.0"

purpose:
  primary_purpose: "Record owner-approved product, architecture, technical, and implementation-scope decisions that justify the current final-state IoTable specification."
  binding_policy: "Decision records explain why the current specification is authoritative. They are not changelogs."

authority:
  constitution: "specs/00-meta/specification-constitution.yaml"
  source_policy: "specs/00-meta/source-policy.yaml"

record_policy:
  requirement_id: "00-meta.decision-records.REQ-001"
  historical_change_log_forbidden: true
  decisions_describe_current_final_state_rationale: true
  decision_id_format: "DEC-YYYY-NNN"

decisions:
  - id: "DEC-2026-001"
    status: "accepted"
    decision: "The canonical branch is main."
    rationale: "Implementation and specification work use main as the canonical branch."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/00-meta/specification-constitution.yaml"
  - id: "DEC-2026-002"
    status: "accepted"
    decision: "Implementation code lives in separate repositories."
    rationale: "The specification repository remains the canonical source of truth and is not mixed with implementation code."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/00-meta/specification-constitution.yaml"
  - id: "DEC-2026-003"
    status: "accepted"
    decision: "Before implementation starts, specification changes are rewritten in place as timeless final-state truth."
    rationale: "The specification must read as current intended system design rather than edit history."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/00-meta/specification-constitution.yaml"
  - id: "DEC-2026-004"
    status: "accepted"
    decision: "Implementation repositories reference the specification repository by commit SHA until a post-implementation version tracking policy exists."
    rationale: "Version increments are disabled before implementation, so commit SHA is the stable reference."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/00-meta/specification-constitution.yaml"
  - id: "DEC-2026-005"
    status: "accepted"
    decision: "One tenant represents one business customer account."
    rationale: "The tenant boundary maps directly to customer data isolation."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
  - id: "DEC-2026-006"
    status: "accepted"
    decision: "Tenant identifiers use ULID format."
    rationale: "ULID provides opaque globally unique identifiers with operational ordering characteristics."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
  - id: "DEC-2026-007"
    status: "accepted"
    decision: "Suspended tenants allow read access, owner account access, platform support access with audit, and administrative recovery actions while blocking operational writes."
    rationale: "Suspension stops operations without blocking account recovery or support."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
  - id: "DEC-2026-008"
    status: "accepted"
    decision: "IoTable does not use a separate venue layer. A tenant directly represents the business location and owns areas and tables."
    rationale: "The product model stays simple and aligns operational hierarchy with tenant isolation."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
      - "specs/01-domain/area-and-table.yaml"
  - id: "DEC-2026-009"
    status: "accepted"
    decision: "Tenants are fully isolated across users, credentials, sessions, data, and data stores. Each tenant has exactly one owner and up to thirty staff users."
    rationale: "Strict isolation simplifies security and product behavior."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
      - "specs/01-domain/user-and-access.yaml"
  - id: "DEC-2026-010"
    status: "accepted"
    decision: "Tenant data isolation uses a separate database per tenant on a shared PostgreSQL server initially, with dedicated database servers allowed later. Kubernetes and tenant-dedicated database containers are not required."
    rationale: "The model preserves strong tenant isolation without unnecessary orchestration complexity."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/tenant.yaml"
      - "specs/03-technical/data-model.yaml"
  - id: "DEC-2026-011"
    status: "accepted"
    decision: "Tenant login context is resolved by tenant subdomain."
    rationale: "Subdomain-based tenant resolution provides a clear tenant boundary before authentication."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/01-domain/user-and-access.yaml"
      - "specs/04-tenancy/tenant-resolution.yaml"
  - id: "DEC-2026-012"
    status: "accepted"
    decision: "Tables use the extended state model. A table may have multiple active orders, and order closure does not automatically make the table available."
    rationale: "Table state and order lifecycle remain independent for real restaurant operations."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/table-service.yaml"
  - id: "DEC-2026-013"
    status: "accepted"
    decision: "A table session is created automatically when the first order is created for a table without an open session."
    rationale: "Automatic session creation keeps service flow fast and avoids a separate open-table action."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/table-service.yaml"
  - id: "DEC-2026-014"
    status: "accepted"
    decision: "A table session may contain multiple independent orders. Submitted order items are not directly mutated; additional requested items create a new order in the same table session."
    rationale: "The table session is the service container, and each submitted order remains an independent work unit."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/order-management.yaml"
  - id: "DEC-2026-015"
    status: "accepted"
    decision: "Menu catalogs are tenant-owned. Only current catalog price is stored. Menu items may have variants. Stock is not tracked; owner manually manages availability."
    rationale: "The catalog remains simple, tenant-specific, and operationally controlled by the owner."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/menu-catalog.yaml"
  - id: "DEC-2026-016"
    status: "accepted"
    decision: "Payment is a dedicated entity. Split payments are supported. Table session closing is manual."
    rationale: "Payment and closing remain auditable, flexible, and aligned with table sessions."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/payment-and-closing.yaml"
  - id: "DEC-2026-017"
    status: "accepted"
    decision: "Tips and overpayments are not supported in the initial payment model."
    rationale: "The initial payment model stays deterministic and avoids settlement ambiguity."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/payment-and-closing.yaml"
  - id: "DEC-2026-018"
    status: "accepted"
    decision: "IoTable uses REST APIs, realtime events, and JWT authentication."
    rationale: "REST keeps the API simple, realtime events support live operations, and JWT matches tenant-scoped authentication."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/03-technical/api-contracts.yaml"
  - id: "DEC-2026-019"
    status: "accepted"
    decision: "IoTable uses PostgreSQL and application-generated ULIDs."
    rationale: "PostgreSQL fits the relational model, while application-generated ULIDs keep identifiers portable across tenant databases."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/03-technical/data-model.yaml"
  - id: "DEC-2026-020"
    status: "accepted"
    decision: "IoTable uses email/password authentication, rate limiting for sensitive actions, and full audit logging for critical actions."
    rationale: "This protects login, payment, order, closing, and support operations while keeping authentication simple."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/03-technical/security.yaml"
  - id: "DEC-2026-021"
    status: "accepted"
    decision: "Customer QR ordering is included in the initial IoTable backend implementation scope."
    rationale: "Customer-facing QR ordering is a core product behavior and integrates with the table session and immutable order model."
    date: "2026-05-03"
    owner: "product_owner"
    affected_documents:
      - "specs/02-capabilities/customer-table-access.yaml"

open_decisions: []
